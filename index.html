<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grid Fitter Pro - Click & Drag Edition</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --accent-color: #a855f7;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }

        .game-container {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 420px;
            width: 100%;
            position: relative;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 5px;
            font-size: 1.8rem;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1rem;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 8px 15px;
            border-radius: 10px;
        }

        .queue-container {
            background: #111827;
            border: 2px dashed var(--accent-color);
            border-radius: 12px;
            height: 110px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .queue-label {
            position: absolute;
            top: 4px;
            left: 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
        }

        .shape-preview-wrapper {
            cursor: grab;
            padding: 15px;
            position: relative;
            z-index: 100;
            display: inline-block;
        }
        
        .shape-preview-wrapper:active {
            cursor: grabbing;
        }

        .shape-preview {
            display: grid;
            gap: 2px;
            pointer-events: none; 
        }

        .grid-matrix {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 3px;
            background: #111827;
            padding: 6px;
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            margin-bottom: 15px;
        }

        .cell {
            background: #1e293b;
            border-radius: 4px;
            transition: background-color 0.05s;
            cursor: pointer;
        }

        .cell.filled {
            box-shadow: inset 0 0 6px rgba(255,255,255,0.2);
        }

        .controls {
            margin-top: 10px;
        }

        .btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }

        .instructions {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 10px;
            line-height: 1.4;
        }

        .game-over-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.96);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 150;
        }

        .game-over-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-over-overlay" id="game-over-screen">
            <h2>Game Over</h2>
            <p style="font-size: 1.2rem; margin-bottom: 20px;">Final Score: <span id="final-score">0</span></p>
            <button class="btn" onclick="resetGame()" style="background: var(--accent-color)">Try Again</button>
        </div>

        <h1>Grid Fitter Pro</h1>
        
        <div class="stats-bar">
            <div>Score: <span id="score-val">0</span></div>
            <div>Lines: <span id="lines-val">0</span></div>
        </div>

        <div class="queue-container">
            <span class="queue-label">Tap Shape to Rotate:</span>
            <div id="drag-wrapper" class="shape-preview-wrapper">
                <div id="shape-preview-box" class="shape-preview"></div>
            </div>
        </div>

        <div class="grid-matrix" id="board"></div>

        <div class="controls">
            <button class="btn" onclick="resetGame()">Reset Game</button>
        </div>

        <p class="instructions">
            🔄 <strong>Tap the shape above</strong> to rotate it! <br>
            👇 <strong>Click / Tap directly on the grid</strong> or drag it down to place it!
        </p>
    </div>

    <script>
        const GRID_SIZE = 10;
        let grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
        let currentShape = null;
        let score = 0;
        let totalLines = 0;

        const SHAPES_POOL = [
            { matrix: [[1]], color: "#38bdf8" }, 
            { matrix: [[1, 1]], color: "#4ade80" }, 
            { matrix: [[1], [1]], color: "#4ade80" }, 
            { matrix: [[1, 1, 1]], color: "#fbbf24" }, 
            { matrix: [[1], [1], [1]], color: "#fbbf24" }, 
            { matrix: [[1, 1], [1, 1]], color: "#f43f5e" }, 
            { matrix: [[1, 0], [1, 1]], color: "#a855f7" }, 
            { matrix: [[1, 1, 1], [0, 1, 0]], color: "#06b6d4" } 
        ];

        const boardEl = document.getElementById("board");
        const previewBox = document.getElementById("shape-preview-box");
        const dragWrapper = document.getElementById("drag-wrapper");
        const scoreVal = document.getElementById("score-val");
        const linesVal = document.getElementById("lines-val");
        const gameOverScreen = document.getElementById("game-over-screen");
        const finalScore = document.getElementById("final-score");

        let isDragging = false;
        let startX = 0, startY = 0;
        let hasMoved = false;
        let lastHighlightedCells = [];

        function createBoard() {
            boardEl.innerHTML = "";
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement("div");
                    cell.classList.add("cell");
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    // Desktop Board Hover & Click Bindings
                    cell.addEventListener("mouseenter", () => onCellHover(r, c));
                    cell.addEventListener("mouseleave", clearHighlights);
                    cell.addEventListener("click", () => attemptPlacement(r, c));

                    boardEl.appendChild(cell);
                }
            }
        }

        function fetchNextShape() {
            const randomIndex = Math.floor(Math.random() * SHAPES_POOL.length);
            currentShape = JSON.parse(JSON.stringify(SHAPES_POOL[randomIndex]));
            renderShapePreview();

            if (!canFitAnywhere()) {
                triggerGameOver();
            }
        }

        function renderShapePreview() {
            previewBox.innerHTML = "";
            previewBox.style.gridTemplateRows = `repeat(${currentShape.matrix.length}, 20px)`;
            previewBox.style.gridTemplateColumns = `repeat(${currentShape.matrix[0].length}, 20px)`;

            currentShape.matrix.forEach(row => {
                row.forEach(value => {
                    const blockUnit = document.createElement("div");
                    if (value === 1) {
                        blockUnit.style.backgroundColor = currentShape.color;
                        blockUnit.style.borderRadius = "3px";
                    }
                    previewBox.appendChild(blockUnit);
                });
            });
            dragWrapper.style.transform = "translate(0px, 0px)";
        }

        function rotateCurrentShape() {
            const matrix = currentShape.matrix;
            const n = matrix.length;
            const m = matrix[0].length;
            
            let rotatedMatrix = Array(m).fill(null).map(() => Array(n).fill(0));
            for (let r = 0; r < n; r++) {
                for (let c = 0; c < m; c++) {
                    rotatedMatrix[c][n - 1 - r] = matrix[r][c];
                }
            }
            currentShape.matrix = rotatedMatrix;
            renderShapePreview();
        }

        function checkValidPlacement(startRow, startCol) {
            const matrix = currentShape.matrix;
            for (let r = 0; r < matrix.length; r++) {
                for (let c = 0; c < matrix[r].length; c++) {
                    if (matrix[r][c] === 1) {
                        let targetRow = startRow + r;
                        let targetCol = startCol + c;
                        if (targetRow >= GRID_SIZE || targetCol >= GRID_SIZE || targetRow < 0 || targetCol < 0 || grid[targetRow][targetCol] !== 0) {
                            return false; 
                        }
                    }
                }
            }
            return true;
        }

        function getCellAtCoordinates(clientX, clientY) {
            const element = document.elementFromPoint(clientX, clientY);
            if (element && element.classList.contains("cell")) {
                return {
                    row: parseInt(element.dataset.row),
                    col: parseInt(element.dataset.col)
                };
            }
            return null;
        }

        function clearHighlights() {
            lastHighlightedCells.forEach(cell => {
                if (grid[cell.r][cell.c] === 0) {
                    const cellEl = document.querySelector(`[data-row='${cell.r}'][data-col='${cell.c}']`);
                    if (cellEl) cellEl.style.backgroundColor = "#1e293b";
                }
            });
            lastHighlightedCells = [];
        }

        function highlightTargetZone(startRow, startCol) {
            clearHighlights();
            if (!currentShape) return;

            const matrix = currentShape.matrix;
            const isValid = checkValidPlacement(startRow, startCol);

            for (let r = 0; r < matrix.length; r++) {
                for (let c = 0; c < matrix[r].length; c++) {
                    if (matrix[r][c] === 1) {
                        let targetRow = startRow + r;
                        let targetCol = startCol + c;
                        if (targetRow < GRID_SIZE && targetCol < GRID_SIZE && targetRow >= 0 && targetCol >= 0) {
                            const cellEl = document.querySelector(`[data-row='${targetRow}'][data-col='${targetCol}']`);
                            if (cellEl && grid[targetRow][targetCol] === 0) {
                                cellEl.style.backgroundColor = isValid ? currentShape.color : "#451a03";
                                lastHighlightedCells.push({r: targetRow, c: targetCol});
                            }
                        }
                    }
                }
            }
        }

        function onCellHover(row, col) {
            if (isDragging) return; // Prevent interference when dragging
            highlightTargetZone(row, col);
        }

        function attemptPlacement(startRow, startCol) {
            if (!checkValidPlacement(startRow, startCol)) {
                clearHighlights();
                dragWrapper.style.transform = "translate(0px, 0px)";
                return;
            }

            const matrix = currentShape.matrix;
            for (let r = 0; r < matrix.length; r++) {
                for (let c = 0; c < matrix[r].length; c++) {
                    if (matrix[r][c] === 1) {
                        grid[startRow + r][startCol + c] = currentShape.color;
                    }
                }
            }

            score += (matrix.flat().filter(v => v === 1).length) * 10;
            clearHighlights();
            updateBoardUI();
            checkAndClearLines();
            fetchNextShape();
        }

        function updateBoardUI() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.querySelector(`[data-row='${r}'][data-col='${c}']`);
                    if (grid[r][c] !== 0) {
                        cell.style.backgroundColor = grid[r][c];
                        cell.classList.add("filled");
                    } else {
                        cell.style.backgroundColor = "#1e293b";
                        cell.classList.remove("filled");
                    }
                }
            }
            scoreVal.textContent = score;
            linesVal.textContent = totalLines;
        }

        function checkAndClearLines() {
            let rowsToClear = [];
            let colsToClear = [];

            for (let r = 0; r < GRID_SIZE; r++) {
                if (grid[r].every(cell => cell !== 0)) rowsToClear.push(r);
            }
            for (let c = 0; c < GRID_SIZE; c++) {
                let colComplete = true;
                for (let r = 0; r < GRID_SIZE; r++) {
                    if (grid[r][c] === 0) { colComplete = false; break; }
                }
                if (colComplete) colsToClear.push(c);
            }

            rowsToClear.forEach(r => grid[r] = Array(GRID_SIZE).fill(0));
            colsToClear.forEach(c => {
                for (let r = 0; r < GRID_SIZE; r++) grid[r][c] = 0;
            });

            let clearedCount = rowsToClear.length + colsToClear.length;
            if (clearedCount > 0) {
                totalLines += clearedCount;
                score += clearedCount * 150;
                setTimeout(updateBoardUI, 80);
            }
        }

        function canFitAnywhere() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (checkValidPlacement(r, c)) return true;
                }
            }
            return false;
        }

        function triggerGameOver() {
            finalScore.textContent = score;
            gameOverScreen.classList.add("active");
        }

        function resetGame() {
            grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
            score = 0;
            totalLines = 0;
            gameOverScreen.classList.remove("active");
            createBoard();
            updateBoardUI();
            fetchNextShape();
        }

        // --- Drag Engine Controls System ---
        function onDragStart(x, y) {
            isDragging = true;
            hasMoved = false;
            startX = x;
            startY = y;
        }

        function onDragMove(x, y) {
            if (!isDragging) return;
            
            let dx = x - startX;
            let dy = y - startY;

            if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
                hasMoved = true;
            }

            if ('ontouchstart' in window) {
                dy -= 70; 
            }

            dragWrapper.style.transform = `translate(${dx}px, ${dy}px)`;

            const rect = previewBox.getBoundingClientRect();
            const topLeftX = rect.left + 10;
            const topLeftY = rect.top + 10;

            const hoveredCell = getCellAtCoordinates(topLeftX, topLeftY);
            if (hoveredCell) {
                highlightTargetZone(hoveredCell.row, hoveredCell.col);
            } else {
                clearHighlights();
            }
        }

        function onDragEnd() {
            if (!isDragging) return;
            isDragging = false;

            // If tapped inside queue container without physical movement -> Rotate!
            if (!hasMoved) {
                rotateCurrentShape();
                return;
            }

            const rect = previewBox.getBoundingClientRect();
            const topLeftX = rect.left + 10;
            const topLeftY = rect.top + 10;

            const droppedCell = getCellAtCoordinates(topLeftX, topLeftY);
            if (droppedCell) {
                attemptPlacement(droppedCell.row, droppedCell.col);
            } else {
                clearHighlights();
                dragWrapper.style.transform = "translate(0px, 0px)";
            }
        }

        // Desktop Drag Hooks Bindings
        dragWrapper.addEventListener("mousedown", (e) => { e.preventDefault(); onDragStart(e.clientX, e.clientY); });
        window.addEventListener("mousemove", (e) => { onDragMove(e.clientX, e.clientY); });
        window.addEventListener("mouseup", () => { onDragEnd(); });

        // Mobile Touch/Tap Support System
        dragWrapper.addEventListener("touchstart", (e) => { 
            e.preventDefault(); 
            const t = e.touches[0]; 
            onDragStart(t.clientX, t.clientY); 
        });
        window.addEventListener("touchmove", (e) => { 
            const t = e.touches[0]; 
            onDragMove(t.clientX, t.clientY); 
        });
        window.addEventListener("touchend", () => { onDragEnd(); });

        // Mobile-Specific Direct Matrix Tapping Handler
        boardEl.addEventListener("touchstart", (e) => {
            const t = e.touches[0];
            const cell = getCellAtCoordinates(t.clientX, t.clientY);
            if (cell) {
                attemptPlacement(cell.row, cell.col);
            }
        });

        createBoard();
        fetchNextShape();
    </script>
</body>
</html>
